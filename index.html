<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & Logo -->
    <title>English Janala | Best English Learning Platform in banGLADesh</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind + Daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Style File -->
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body class="mx-auto w-11/12 space-y-10 md:space-y-50">
    <!-- NAVBAR -->
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow gap-y-2"
            >
              <a href="" class=""
                ><i class="fa-solid fa-circle-question"></i> FAQ</a
              >
              <a href="" class=""
                ><i class="fa-solid fa-book-open"></i> Learn</a
              >
              <a href="" class=""
                ><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a
              >
            </ul>
          </div>

          <!-- LOGO -->
          <div class="logo flex items-center gap-1">
            <h1 class="font-bold">English</h1>
            <img src="./assets/logo.png" alt="" />
            <h1 class="text-lg text-bangla font-bold">জানালা</h1>
          </div>
        </div>

        <!-- Navbar Buttons -->
        <div class="navbar-end hidden lg:flex space-x-4">
          <a href="" class="btn btn-outline btn-primary"
            ><i class="fa-solid fa-circle-question"></i> FAQ</a
          >
          <a href="" class="btn btn-outline btn-primary"
            ><i class="fa-solid fa-book-open"></i> Learn</a
          >
          <a href="" class="btn btn-outline btn-primary"
            ><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a
          >
        </div>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero-container flex flex-col-reverse text-center  md:flex-row md:text-left justify-between gap-10 items-center border border-gray-100">
      <div class="hero-left w-100%">
        <h2 class="text-5xl font-bold mb-8"><span class="text-5xl font-bold text-sky-400">English </span>is Easy!!</h2>
        <p class="text-bangla mb-7">
          আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
          অন্য একটি Level এ
        </p>
        <form class="space-y-5 py-2" action="">
          <input class="border-gray-300 rounded-md inline-block py-2.25 px-3" type="text" name="name" placeholder="Enter Your Name" id="" />
          <div>
            <input class="border-gray-300 rounded-md py-2.25 px-3
              type="password"
              name="password"
              placeholder="***********"
              id=""
            />
          </div>
          <div>
            <button class="btn btn-primary" type="submit">Get Started</button>
          </div>
        </form>
      </div>
      <div class="hero-right w-100%">
        <img src="./assets/hero-student.png" alt="" />
      </div>
    </section>

    <!-- Let's Learn -->
    <section class=" border border-gray-100">
      <div>
        <h2 class="text-4xl font-bold mb-8 text-center"><span class="text-9 font-bold text-sky-400">Let's </span>Learn Vocabularies</h2>
      </div>
      <div id="level-container" class="flex gap-4 flex-wrap justify-center mb-10"></div>
      <!-- <div class="lesson-select py-16 text-center bg-base-200">
        <p class="mb-3">
          <span class="text-bangla text-xs text-gray-400">আপনি এখনো কোন </span><span class="text-xs text-gray-400">Lesson Select </span> <span class="text-bangla text-xs text-gray-400">করেন</span></p>
          <h2><span class="text-bangla text-4xl">একটি </span><span class="text-4xl">Lesson Select </span><span class="text-bangla text-4xl">করুন।</span></h2>
      </div> -->

    
    </section>

    <section id="word-container" class="bg-base-200 p-10 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
      
    </section>

    <script src="./scripts/index.js"></script>
  </body>
</html>
